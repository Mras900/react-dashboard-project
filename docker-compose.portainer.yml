services:
  dashboard_backend:
    container_name: dashboard_backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL requerida}
      CRM_BASE_URL: ${CRM_BASE_URL}
      CRM_USERNAME: ${CRM_USERNAME}
      CRM_PASSWORD: ${CRM_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET requerido}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME requerido}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD requerido}
      ADMIN_DISPLAY_NAME: ${ADMIN_DISPLAY_NAME:-Administrador}
      ACCESS_TOKEN_MINUTES: ${ACCESS_TOKEN_MINUTES:-480}
    restart: unless-stopped
    networks:
      - dashboard_net
      - boletas_db_net
    expose:
      - "8000"
    volumes:
      - dashboard_backend_data:/app/data

  dashboard_frontend:
    container_name: dashboard_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - dashboard_backend
    networks:
      - dashboard_net
    ports:
      - "8082:80"

volumes:
  dashboard_backend_data:

networks:
  dashboard_net:
    external: true
    name: dashboard_net
  boletas_db_net:
    external: true
    name: boletas-app_default