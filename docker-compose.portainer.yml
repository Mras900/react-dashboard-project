services:
  dashboard_backend:
    container_name: dashboard_backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CRM_BASE_URL: ${CRM_BASE_URL}
      CRM_USERNAME: ${CRM_USERNAME}
      CRM_PASSWORD: ${CRM_PASSWORD}
    restart: unless-stopped
    networks:
      - dashboard_net
    expose:
      - "8000"

  dashboard_frontend:
    container_name: dashboard_frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - dashboard_backend
    networks:
      - dashboard_net
    ports:
      - "8082:80"

networks:
  dashboard_net:
    external: true
